<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Althea Systems — Catégorie</title>
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body>
    <header class="header">
      <a class="brand" href="/"><span class="brand-dot"></span><span>Althea Systems</span></a>
      <nav class="nav">
        <a href="/">Accueil</a>
        <a href="/cart.html" class="cart-link">
          Panier
          <span id="cartCount" class="cart-badge">0</span>
        </a>
      </nav>
    </header>

    <main class="container">
      <section class="section">
        <div class="category-hero" id="categoryHero">
          <div>
            <h1 id="catName">Catégorie</h1>
            <p class="muted" id="catDesc"></p>
          </div>
        </div>

        <div class="toolbar">
          <input id="q" class="input" placeholder="Recherche (nom, description, caractéristiques…)" />
          <select id="sort" class="input">
            <option value="priority">Priorité + Stock</option>
            <option value="price_asc">Prix ↑</option>
            <option value="price_desc">Prix ↓</option>
            <option value="name_asc">Nom A→Z</option>
            <option value="name_desc">Nom Z→A</option>
          </select>
          <label class="check">
            <input id="inStock" type="checkbox" />
            Uniquement disponibles
          </label>
          <button id="searchBtn">Filtrer</button>
        </div>

        <div id="grid" class="grid"></div>

        <div class="pager">
          <button id="prevBtn">← Précédent</button>
          <div id="pageInfo" class="muted"></div>
          <button id="nextBtn">Suivant →</button>
        </div>
      </section>
    </main>

    <script type="module" src="/assets/js/category.js"></script>
  </body>
</html>
