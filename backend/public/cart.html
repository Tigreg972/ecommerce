<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Althea Systems — Panier</title>
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body>
    <header class="header">
      <a class="brand" href="/">
        <span class="brand-dot"></span>
        <span>Althea Systems</span>
      </a>

      <nav class="nav">
        <a href="/">Accueil</a>
        <a href="/cart.html" class="cart-link">
          Panier
          <span id="cartCount" class="cart-badge">0</span>
        </a>
      </nav>
    </header>

    <main class="container">
      <section class="section">
        <h1>Mon panier</h1>

        <div id="cartEmpty" class="card empty-state" style="display:none;">
          <h2>Votre panier est vide</h2>
          <p class="muted">Ajoutez des produits pour commencer votre commande.</p>
          <a class="btn" href="/">Retour au catalogue</a>
        </div>

        <div id="cartLayout" class="cart-layout" style="display:none;">
          <div>
            <div id="cartItems" class="cart-items"></div>
          </div>

          <aside class="card cart-summary">
            <h2>Résumé</h2>
            <div class="summary-row">
              <span>Sous-total</span>
              <strong id="subtotal">0,00 €</strong>
            </div>
            <div class="summary-row">
              <span>Articles</span>
              <strong id="totalItems">0</strong>
            </div>
            <div class="summary-row total-row">
              <span>Total</span>
              <strong id="grandTotal">0,00 €</strong>
            </div>

            <button id="clearCartBtn" class="btn btn-danger" type="button">Vider le panier</button>
            <a class="btn" href="/">Continuer mes achats</a>
            <button class="btn btn-ghost" type="button" disabled>Passer commande (à venir)</button>
          </aside>
        </div>
      </section>
    </main>

    <script type="module" src="/assets/js/cart-page.js"></script>
  </body>
</html>
